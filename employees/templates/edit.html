<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tahrirlash</title>
</head>
<body>
{% extends 'base.html' %}

{% block content %}
<div class="card shadow p-4">
    <h3 class="mb-3">✏️ Xodimni tahrirlash</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Ism</label>
            <input type="text" name="name" value="{{ emp.name }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Lavozim</label>
            <input type="text" name="position" value="{{ emp.position }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Maosh</label>
            <input type="number" name="salary" value="{{ emp.salary }}" class="form-control">
        </div>

        <button class="btn btn-primary">Yangilash</button>
        <a href="/" class="btn btn-secondary">Orqaga</a>
    </form>
</div>
{% endblock %}
</body>
</html>
