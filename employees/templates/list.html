<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company</title>
</head>
<body>
{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Xodimlar ro‘yxati</h2>

<a href="/add/" class="btn btn-success mb-3">➕ Yangi xodim</a>

<table class="table table-bordered table-hover bg-white shadow">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Ism</th>
            <th>Lavozim</th>
            <th>Maosh</th>
            <th>Amallar</th>
        </tr>
    </thead>
    <tbody>
        {% for emp in employees %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ emp.name }}</td>
            <td>{{ emp.position }}</td>
            <td>${{ emp.salary }}</td>
            <td>
                <a href="/edit/{{ emp.id }}/" class="btn btn-warning btn-sm">✏️</a>
                <a href="/delete/{{ emp.id }}/" class="btn btn-danger btn-sm">❌</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-center">Xodimlar yo‘q</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
</body>
</html>
